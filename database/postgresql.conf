# PostgreSQL Security Configuration
# Generated: 2026-02-02

# =============================================================================
# LOGGING - Security Auditing
# =============================================================================

# Enable logging
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB

# What to log
log_statement = 'ddl'                    # Log DDL statements (CREATE, ALTER, DROP)
log_connections = on                      # Log successful connections
log_disconnections = on                   # Log disconnections
log_duration = off                        # Don't log query duration (performance)
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# Log slow queries (longer than 1 second)
log_min_duration_statement = 1000

# Log failed authentication attempts
log_error_verbosity = default

# =============================================================================
# SECURITY SETTINGS
# =============================================================================

# Password encryption
password_encryption = scram-sha-256

# SSL (optional - enable if certificates available)
# ssl = on
# ssl_cert_file = '/etc/ssl/certs/server.crt'
# ssl_key_file = '/etc/ssl/private/server.key'

# Connection limits
max_connections = 100
superuser_reserved_connections = 3

# =============================================================================
# PERFORMANCE (basic settings)
# =============================================================================

shared_buffers = 256MB
effective_cache_size = 768MB
maintenance_work_mem = 64MB
checkpoint_completion_target = 0.9
wal_buffers = 8MB
default_statistics_target = 100
random_page_cost = 1.1
effective_io_concurrency = 200
work_mem = 2621kB
min_wal_size = 1GB
max_wal_size = 4GB
