# Deploy to VPS on push to main
# Secrets: VPS_HOST, VPS_USER, VPS_PASSWORD
# On VPS: clone this repo to e.g. /var/www/cfaquiz or /root/cfaquiz and set DEPLOY_PATH below

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /var/www/cfaquiz

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy CFA Quiz
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            git pull origin main
            docker compose down
            docker compose up -d --build
            echo "CFA Quiz deployed successfully!"
