# Nginx snippet for CFA Quiz (copy to VPS /etc/nginx/conf.d/ and set server_name)
# On VPS, app runs as Docker service "cfaquiz-app" on port 3000 (same compose network as nginx)
# If running standalone: proxy_pass http://127.0.0.1:3000;

server {
    listen 80;
    server_name cfa.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name cfa.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/cfa.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cfa.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 50M;

    location / {
        proxy_pass http://cfaquiz-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
